# apache-file-proxy.conf — serve missing uploads from production (committed, seeded once).
#
# Installed into Apache by .tugboat/scripts/files.sh when FILES_PROXY=true. The
# script replaces __PROD_URL__ with the configured PROD_URL. Any request for an
# upload that does not exist locally is redirected to production, so previews
# render media without copying the whole uploads directory.
<IfModule mod_rewrite.c>
  RewriteEngine On
  RewriteCond %{REQUEST_URI} ^/wp-content/uploads/ [NC]
  RewriteCond %{DOCUMENT_ROOT}%{REQUEST_URI} !-f
  RewriteRule ^/?(.*)$ __PROD_URL__/$1 [R=302,L]
</IfModule>
