# =============================================================================
# Tugboat — WordPress on WP Engine
# =============================================================================
# Seeded once (overwrite:false) — owned by the site. The first init command runs
# `composer install`, which materializes the gitignored .tugboat/scripts/*.
# Non-secret settings live in .tugboat/tugboat.env; add the WP Engine SSH key in
# the Tugboat dashboard. Change PHP by editing the php image tag below.
# =============================================================================
version: 1
services:
  php:
    image: tugboatqa/php:8.2-apache
    default: true
    depends:
      - mysql
    urls:
      - /
    commands:
      init:
        # composer install scaffolds the gitignored .tugboat/scripts/* first.
        - composer install --no-interaction
        - chmod +x ./.tugboat/scripts/*.sh
        - ./.tugboat/scripts/install-tools.sh
      update:
        # Snapshot baseline: dependencies + DB + files, cached and refreshed
        # on demand. database.sh needs the wp-config build.sh creates.
        - ./.tugboat/scripts/build.sh
        - ./.tugboat/scripts/database.sh
        - ./.tugboat/scripts/files.sh
      build:
        # Runs on EVERY preview build (each commit), so re-run build.sh here to
        # pull this commit's composer deps and rebuild the theme. composer
        # install re-materializes the gitignored scripts, so re-apply +x.
        - ./.tugboat/scripts/build.sh
        - chmod +x ./.tugboat/scripts/*.sh
        - ./.tugboat/scripts/deploy.sh

  mysql:
    image: tugboatqa/mysql:8
    commands:
      init:
        - mysql -e "SET GLOBAL max_allowed_packet=536870912;"
